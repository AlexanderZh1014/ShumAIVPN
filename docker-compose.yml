services:
  postgres:
    image: postgres:16
    container_name: vpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vpnadmin
      POSTGRES_PASSWORD: vpnpassword123
      POSTGRES_DB: vpnplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: